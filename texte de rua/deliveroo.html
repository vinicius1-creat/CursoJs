<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliver Order</title>
    <link rel="stylesheet" href="deliveriappstyle.css">
</head>
<body>
    <header>
        <div class="menu"></div>
            <h2>Deliver order</h2>
        <div class="chat"></div>
    </header>

    <section class="client">
        <div>
            <h3>Yingyi Luo</h3>
            <p>21 Trewint Street, W112, SW184HA</p>
        </div>
        <div class=""></div>
    </section>

    <section class="order-card">
        <h2>Order #4233</h2>
        <span class="items">4 items . View</span>

        <div class="confirm">
            Confirm deliver with 2-digit code
            <span></span>
        </div>

    </section>
    <section class="steps">
        <h3>Can't find Yingyi Luo</h3>
        <p>Don't worry, just follow these steps.</p>

        <h4>Step 1</h4>
        <div class="buttons">
        <div class="btn done">
            Call again
        </div>
        </div>

        <h4>Step 2</h4>

        <div class="btn disabled">
            Tell Yingyi Luo you're leaving soon
        </div>

        <h4>Step 3</h4>
        <div class="btn disabled">
            Leave the order
        </div>

    </section>
    <button class="confirm-btn">
        Confirm delivery to complete
    </button>

    <script src="script.js"></script>

</body>
</html>
