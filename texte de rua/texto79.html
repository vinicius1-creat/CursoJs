                    <h3>Extreme Conditions</h3>
                    <p>Today I was watching a very interesting documentary on TV.It was about scientists in the Arctic.They are geologists and meteorologists.These people monitor climate change.They live in extreme conditions.The weather in the Arctic is severe and it changes very fast.It can change from being a still and sunny day to a snowstorm with gale-force, howling wind.But fighting the cold weather is not the only problem they have there.These brave people must be very careful because there are polar bears everywhere.The documentary said the polar bears are the most dangerous animals in the World.They are not afraid of humans and dogs.</p>
                </div>
